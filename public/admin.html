<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel – APK Hub VIP</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="admin-container">
    <div id="loginContainer" class="login-container glass-card">
        <h2><i class="fas fa-shield-alt"></i> Admin Access</h2>
        <form id="loginForm">
            <input type="password" id="adminPassword" placeholder="Enter admin password" required>
            <button type="submit">Login</button>
            <div id="loginError" class="error-msg"></div>
        </form>
    </div>
    <div id="dashboardContainer" style="display:none;">
        <nav class="admin-nav">
            <div class="nav-brand"><i class="fas fa-crown"></i><span>APK <span class="vip-text">Admin</span></span></div>
            <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </nav>
        <div class="admin-layout">
            <aside class="sidebar">
                <ul>
                    <li class="active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
                    <li data-tab="apps"><i class="fas fa-mobile-alt"></i> Manage Apps</li>
                    <li data-tab="requests"><i class="fas fa-tasks"></i> Payment Requests</li>
                    <li data-tab="settings"><i class="fas fa-cog"></i> Website Settings</li>
                </ul>
            </aside>
            <main class="admin-main">
                <div id="dashboardTab" class="tab-content active"><h1>Dashboard</h1><div class="stats-grid"><div class="stat-card"><i class="fas fa-mobile-alt"></i><h3 id="totalApps">0</h3><p>Total Apps</p></div><div class="stat-card"><i class="fas fa-check-circle"></i><h3 id="approvedApps">0</h3><p>Approved Apps</p></div><div class="stat-card"><i class="fas fa-clock"></i><h3 id="pendingApps">0</h3><p>Pending Apps</p></div><div class="stat-card"><i class="fas fa-download"></i><h3 id="totalRequests">0</h3><p>Total Requests</p></div><div class="stat-card"><i class="fas fa-hourglass-half"></i><h3 id="pendingRequests">0</h3><p>Pending Requests</p></div></div></div>
                <div id="appsTab" class="tab-content"><h1>Manage Apps</h1><button id="uploadAppBtn" class="primary-btn">+ Upload New App</button><div id="appsListAdmin" class="apps-table-container"><p>Loading apps...</p></div></div>
                <div id="requestsTab" class="tab-content"><h1>Payment & Download Requests</h1><div id="requestsList"></div></div>
                <div id="settingsTab" class="tab-content"><h1>Website Settings</h1><form id="settingsForm"><div class="form-group"><label>Website Status</label><div class="toggle-switch"><input type="checkbox" id="websiteToggle"><label for="websiteToggle"></label><span id="statusText">Active</span></div></div><div class="form-group"><label>Shutdown Message</label><textarea id="shutdownMessage" rows="3"></textarea></div><div class="form-group"><label>Site Title</label><input type="text" id="siteTitle"></div><button type="submit" class="save-btn">Save Settings</button><div id="settingsMsg"></div></form></div>
            </main>
        </div>
    </div>
</div>
<script>
// Hardcoded password check
const ADMIN_PASSWORD = 'admin123';

document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const pwd = document.getElementById('adminPassword').value;
    if (pwd === ADMIN_PASSWORD) {
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('dashboardContainer').style.display = 'block';
        loadStats();
        loadApps();
        loadRequests();
    } else {
        document.getElementById('loginError').innerText = 'Invalid password';
    }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
    document.getElementById('loginContainer').style.display = 'block';
    document.getElementById('dashboardContainer').style.display = 'none';
});

let currentApps = [];

async function loadStats() {
    const res = await fetch('/admin/api/stats');
    const s = await res.json();
    document.getElementById('totalApps').innerText = s.totalApps;
    document.getElementById('approvedApps').innerText = s.approvedApps;
    document.getElementById('pendingApps').innerText = s.pendingApps;
    document.getElementById('totalRequests').innerText = s.totalRequests;
    document.getElementById('pendingRequests').innerText = s.pendingRequests;
}

async function loadApps() {
    const res = await fetch('/admin/api/apps');
    currentApps = await res.json();
    const container = document.getElementById('appsListAdmin');
    if (!currentApps.length) { container.innerHTML = '<p>No apps.</p>'; return; }
    let html = '<div class="apps-table-wrapper"><table class="apps-table"><thead><tr><th>Icon</th><th>Name</th><th>Version</th><th>Status</th><th>Price</th><th>Actions</th></tr></thead><tbody>';
    currentApps.forEach(app => {
        html += `<tr><td>${app.image ? `<img src="${app.image}" class="table-icon">` : '<i class="fas fa-mobile-alt"></i>'}</td><td><strong>${escapeHtml(app.name)}</strong><br><small>${escapeHtml(app.description.substring(0,50))}</small></td><td>${escapeHtml(app.version)}</td><td><span class="status-badge ${app.status}">${app.status}</span></td><td>${app.isPaid ? `PKR ${app.price}` : 'Free'}</td><td class="actions">${app.status === 'pending' ? `<button class="approve-btn" data-id="${app.id}">Approve</button><button class="reject-btn" data-id="${app.id}">Reject</button>` : ''}<button class="edit-btn" data-id="${app.id}">Edit</button><button class="delete-btn" data-id="${app.id}">Delete</button></td></tr>`;
    });
    html += '</tbody></table></div>';
    container.innerHTML = html;
    document.querySelectorAll('.approve-btn').forEach(btn => btn.addEventListener('click', () => approveApp(btn.dataset.id)));
    document.querySelectorAll('.reject-btn').forEach(btn => btn.addEventListener('click', () => rejectApp(btn.dataset.id)));
    document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => openEditModal(btn.dataset.id)));
    document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', () => deleteApp(btn.dataset.id)));
}

async function approveApp(id) {
    await fetch(`/admin/api/app/${id}/approve`, { method: 'POST' });
    loadApps();
    loadStats();
}

async function rejectApp(id) {
    await fetch(`/admin/api/app/${id}/reject`, { method: 'POST' });
    loadApps();
    loadStats();
}

async function deleteApp(id) {
    if(!confirm('Delete?')) return;
    await fetch(`/admin/api/app/${id}`, { method: 'DELETE' });
    loadApps();
    loadStats();
}

function openEditModal(id) {
    alert('Edit feature - will implement');
}

async function loadRequests() {
    const res = await fetch('/admin/api/requests');
    const reqs = await res.json();
    const container = document.getElementById('requestsList');
    if (!reqs.length) { container.innerHTML = '<p>No requests.</p>'; return; }
    let html = '<div class="apps-table-wrapper"><table class="apps-table"><thead><tr><th>User</th><th>Email</th><th>App</th><th>Paid</th><th>Proof</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
    reqs.forEach(r => {
        html += `<tr><td>${escapeHtml(r.userName)}</td><td>${escapeHtml(r.userEmail)}</td><td>${escapeHtml(r.appName)}</td><td>${r.isPaid ? 'Yes' : 'No'}</td><td>${r.proofImage ? `<a href="${r.proofImage}" target="_blank">View</a>` : '-'}</td><td><span class="status-badge ${r.status}">${r.status}</span></td><td class="actions">${r.status === 'pending' ? `<button class="approve-request" data-id="${r.id}">Approve</button><button class="reject-request" data-id="${r.id}">Reject</button>` : ''}</td></tr>`;
    });
    html += '</tbody></table></div>';
    container.innerHTML = html;
    document.querySelectorAll('.approve-request').forEach(btn => btn.addEventListener('click', () => approveRequest(btn.dataset.id)));
    document.querySelectorAll('.reject-request').forEach(btn => btn.addEventListener('click', () => rejectRequest(btn.dataset.id)));
}

async function approveRequest(id) {
    await fetch(`/admin/api/request/${id}/approve`, { method: 'POST' });
    loadRequests();
    loadStats();
}

async function rejectRequest(id) {
    await fetch(`/admin/api/request/${id}/reject`, { method: 'POST' });
    loadRequests();
    loadStats();
}

function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

// Tab switching
document.querySelectorAll('.sidebar li').forEach(tab => {
    tab.addEventListener('click', () => {
        const id = tab.dataset.tab;
        document.querySelectorAll('.sidebar li').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`${id}Tab`).classList.add('active');
        if (id === 'dashboard') loadStats();
        if (id === 'apps') loadApps();
        if (id === 'requests') loadRequests();
    });
});
</script>

<!-- Upload Modal -->
<div id="uploadModal" class="modal">
    <div class="modal-content glass-card">
        <span class="close-modal">&times;</span>
        <h2>Upload New App</h2>
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-group">
                <label>App Name *</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Description *</label>
                <textarea name="description" required></textarea>
            </div>
            <div class="form-group">
                <label>Version *</label>
                <input type="text" name="version" required>
            </div>
            <div class="form-group">
                <label>Tags (comma separated)</label>
                <input type="text" name="tags" placeholder="game, tool, social">
            </div>
            <div class="form-group">
                <label>APK File *</label>
                <input type="file" name="apkFile" accept=".apk" required>
            </div>
            <div class="form-group">
                <label>Icon Image</label>
                <input type="file" name="iconImage" accept="image/*">
            </div>
            <div class="form-group">
                <label><input type="checkbox" name="isPaid" value="true"> Paid App</label>
            </div>
            <div class="form-group">
                <label>Price (PKR)</label>
                <input type="number" name="price" step="0.01" value="0">
            </div>
            <button type="submit" class="primary-btn">Upload App</button>
        </form>
        <div id="uploadMsg"></div>
    </div>
</div>

<style>
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}
.modal-content {
    max-width: 500px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 2rem;
    background: var(--card-bg);
    border-radius: 24px;
    border: 1px solid var(--glass-border);
    position: relative;
}
.close-modal {
    position: absolute;
    top: 1rem;
    right: 1rem;
    font-size: 1.5rem;
    cursor: pointer;
}
.form-group {
    margin-bottom: 1rem;
}
.form-group label {
    display: block;
    margin-bottom: 0.5rem;
}
.form-group input, .form-group textarea {
    width: 100%;
    padding: 0.5rem;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    color: white;
}
.primary-btn {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none;
    padding: 0.7rem 1.5rem;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
}
</style>

<script>
// Upload modal functionality
const uploadModal = document.getElementById('uploadModal');
const uploadBtn = document.getElementById('uploadAppBtn');
const closeModal = document.querySelector('#uploadModal .close-modal');

uploadBtn.onclick = () => {
    uploadModal.style.display = 'flex';
};

closeModal.onclick = () => {
    uploadModal.style.display = 'none';
};

window.onclick = (event) => {
    if (event.target === uploadModal) {
        uploadModal.style.display = 'none';
    }
};

// Upload form submission
document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const msgDiv = document.getElementById('uploadMsg');
    msgDiv.innerHTML = 'Uploading...';
    
    try {
        const res = await fetch('/admin/api/upload', {
            method: 'POST',
            body: formData
        });
        const data = await res.json();
        if (res.ok) {
            msgDiv.innerHTML = '<span style="color:#4caf50;">✅ Upload successful! App is pending approval.</span>';
            e.target.reset();
            setTimeout(() => {
                uploadModal.style.display = 'none';
                loadApps();
                loadStats();
            }, 2000);
        } else {
            msgDiv.innerHTML = `<span style="color:#ff6584;">❌ Error: ${data.error}</span>`;
        }
    } catch (err) {
        msgDiv.innerHTML = '<span style="color:#ff6584;">Upload failed. Check console.</span>';
    }
});
</script>
</body>
</html>
